plugin:
  name: hermes-openai-plugin
  version: 1.0.0
  description: Hermes OpenAI 兼容插件，让 Hermes 支持标准大模型 API 格式

api_keys:
  - sk-hermes-1234567890
  - sk-hermes-0987654321

hermes_core:
  url: http://localhost:10101
  api_path: /chat

server:
  host: 0.0.0.0
  port: 10101

defaults:
  model: hermes
  temperature: 0.7
  stream: false
