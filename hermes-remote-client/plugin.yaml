plugin:
  name: hermes-remote-client
  version: 1.0.0
  description: Hermes 远程客户端插件，用于连接局域网或外网的服务端程序

servers:
  default:
    url: http://localhost:10101
    api_path: /v1/chat/completions
    api_key: sk-hermes-1234567890
  dev:
    url: http://192.168.1.100:10101
    api_path: /v1/chat/completions
    api_key: sk-hermes-dev-123456
  prod:
    url: https://api.example.com
    api_path: /v1/chat/completions
    api_key: sk-hermes-prod-789012

client:
  timeout: 30
  retries: 3
  retry_delay: 1

api_keys:
  - sk-hermes-client-1234567890
  - sk-hermes-client-0987654321

server:
  host: 0.0.0.0
  port: 10102

defaults:
  model: gpt-3.5-turbo
  temperature: 0.7
  stream: false
  server: default
